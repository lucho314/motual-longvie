x-laravel-environment: &laravel-environment
  APP_KEY: ${APP_KEY:?APP_KEY is required}
  APP_ENV: ${APP_ENV:-production}
  APP_DEBUG: ${APP_DEBUG:-false}
  APP_URL: ${APP_URL:-https://mutual-longvie.ar}
  DB_CONNECTION: ${DB_CONNECTION:-mysql}
  DB_HOST: ${DB_HOST:-mariadb}
  DB_PORT: ${DB_PORT:-3306}
  DB_DATABASE: ${DB_DATABASE:-mutual}
  DB_USERNAME: ${DB_USERNAME:-laravel}
  DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
  REDIS_HOST: ${REDIS_HOST:-redis}
  REDIS_PORT: ${REDIS_PORT:-6379}
  QUEUE_CONNECTION: ${QUEUE_CONNECTION:-redis}
  MAIL_MAILER: ${MAIL_MAILER:-smtp}
  MAIL_HOST: ${MAIL_HOST:-smtp-relay.brevo.com}
  MAIL_PORT: ${MAIL_PORT:-587}
  MAIL_USERNAME: ${MAIL_USERNAME:?MAIL_USERNAME is required}
  MAIL_PASSWORD: ${MAIL_PASSWORD:?MAIL_PASSWORD is required}
  MAIL_ENCRYPTION: ${MAIL_ENCRYPTION:-tls}
  MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:?MAIL_FROM_ADDRESS is required}
  MAIL_FROM_NAME: ${MAIL_FROM_NAME:-ASOCIACION MUTUAL PERSONAL LONGVIE PARANA}

services:
  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    restart: unless-stopped
    depends_on:
      - app
    volumes:
      - storage:/var/www/html/storage
    networks:
      - mutual-network

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    restart: unless-stopped
    depends_on:
      - mariadb
      - redis
    environment:
      <<: *laravel-environment
    volumes:
      - storage:/var/www/html/storage
    networks:
      - mutual-network

  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    restart: unless-stopped
    depends_on:
      - mariadb
      - redis
    command: php artisan queue:work --sleep=3 --tries=3 --timeout=90
    environment:
      <<: *laravel-environment
    volumes:
      - storage:/var/www/html/storage
    networks:
      - mutual-network

  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    restart: unless-stopped
    depends_on:
      - mariadb
      - redis
    command: php artisan schedule:work
    environment:
      <<: *laravel-environment
    volumes:
      - storage:/var/www/html/storage
    networks:
      - mutual-network

  mariadb:
    image: mariadb:10.11
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      MYSQL_DATABASE: ${DB_DATABASE:-mutual}
      MYSQL_USER: ${DB_USERNAME:-laravel}
      MYSQL_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - mariadb_data_v2:/var/lib/mysql
    networks:
      - mutual-network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - redis_data:/data
    networks:
      - mutual-network

networks:
  mutual-network:
    driver: bridge

volumes:
  mariadb_data_v2:
  redis_data:
  storage:
